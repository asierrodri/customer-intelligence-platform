services:
  mysql:
    image: mysql:8.0
    container_name: cip-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 20

  ml:
    build: ./ml
    container_name: cip-ml
    environment:
      PORT: ${ML_PORT}
    ports:
      - "${ML_PORT}:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 20

  api:
    build: ./api
    container_name: cip-api
    environment:
      PORT: ${API_PORT}
      JWT_SECRET: ${JWT_SECRET}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE}
      DB_USER: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      ML_BASE_URL: http://ml:8000
    ports:
      - "${API_PORT}:3000"
    depends_on:
      mysql:
        condition: service_healthy
      ml:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: cip-frontend
    environment:
      VITE_API_BASE_URL: http://localhost:${API_PORT}
    ports:
      - "${FRONTEND_PORT}:5173"
    depends_on:
      - api

  etl:
    build: ./etl
    container_name: cip-etl
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE}
      DB_USER: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - ./data:/data
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data: